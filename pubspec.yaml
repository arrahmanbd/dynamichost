name: dynamichostbd
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^3.2.1
  flutter_riverpod: ^3.2.1
  flutter_addons: ^3.0.0
  flutter_svg: ^2.2.3
  carousel_slider: ^5.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/svg/
    - assets/fonts/

  fonts:
    # =========================
    # INTER (Primary UI Font)
    # =========================
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_Light.ttf
          weight: 300
        - asset: assets/fonts/Inter_Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_SemiBold.ttf
          weight: 600

    # =========================
    # HIND SILIGURI (Bangla)
    # =========================
    - family: HindSiliguri
      fonts:
        - asset: assets/fonts/HindSiliguri-Regular.ttf
          weight: 400
        - asset: assets/fonts/HindSiliguri-SemiBold.ttf
          weight: 600